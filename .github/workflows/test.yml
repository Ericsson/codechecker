name: codechecker-tests

# Triggers the workflow on push or pull request events.
on: [push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Note: UI related linter tests will run in the gui job.
  lint:
    name: Linters (pylint, pycodestyle)

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install $(grep -iE "pylint|pycodestyle" analyzer/requirements_py/dev/requirements.txt)
      - name: Run pycodestyle & pylint
        run: make -k pycodestyle pylint

  type-checker:
    name: Type checker (mypy)

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Create venv-dev
        run: |
          make venv_dev
      - name: Run mypy
        run: |
          make mypy

  tools:
    name: Tools (report-converter, etc.)
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Bazel
        if: runner.os == 'Linux'
        uses: abhinavsingh/setup-bazel@v3
        with:
          version: 4.0.0
      - name: Install common dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install gcc-multilib

      - name: Run build-logger tests
        if: runner.os == 'Linux'
        working-directory: analyzer/tools/build-logger
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make all
          make test

      - name: Run merge-clang-extdef-mappings tests
        working-directory: analyzer/tools/merge_clang_extdef_mappings
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make test

      - name: Run statistics-collector tests
        working-directory: analyzer/tools/statistics_collector
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make test

      - name: Run report-converter tests
        working-directory: tools/report-converter
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make package
          make test

      - name: Run tu-collector tests
        working-directory: tools/tu_collector
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make test

      - name: Run bazel-compile-commands tests
        if: runner.os == 'Linux'
        working-directory: tools/bazel
        run: |
          pip install -r requirements_py/dev/requirements.txt
          make test

  analyzer:
    name: Analyzer
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sh .github/workflows/install-deps.sh

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: sh .github/workflows/install-deps-macos.sh

      - name: Build the package
        run: |
          make pip_dev_deps
          BUILD_UI_DIST=NO make package

      - name: Run analyzer tests
        working-directory: analyzer
        run: make test_unit test_functional

      - name: Analyzer unit tests coverage
        working-directory: analyzer
        run: make test_unit_cov

  web:
    name: Web
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        database: [sqlite, psql_pg8000, psql_psycopg2]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: sh .github/workflows/install-deps.sh

      - name: Init .pgpass
        if: matrix.database != 'sqlite'
        run: |
          echo '*:*:*:*:postgres' > $HOME/.pgpass
          chmod 0600 $HOME/.pgpass

      - name: Run tests
        env:
          PGPASSWORD: postgres
        run: |
          if [[ "${{ matrix.database != 'sqlite' }}" == "true" ]]
          then
            export PGPASSFILE=$HOME/.pgpass
          fi

          make pip_dev_deps
          pip3 install -r web/requirements_py/auth/requirements.txt
          BUILD_UI_DIST=NO make package

          make -C web test_matrix_${{ matrix.database }}

      - name: Run unit tests coverage
        working-directory: web
        run: make test_unit_cov

  web-macos:
    name: Web (macOS)
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: sh .github/workflows/install-deps-macos.sh

      - name: Run tests
        run: |
          make pip_dev_deps
          pip3 install -r web/requirements_py/auth/requirements.txt
          BUILD_UI_DIST=NO make package

          # Run full functional test suite.
          cd web
          make test_matrix_sqlite
        env:
          CC_TEST_API_WORKERS: "1"
          CC_TEST_TASK_WORKERS: "1"

      - name: Run unit tests coverage
        working-directory: web
        run: make test_unit_cov

  analyzer-windows:
    name: Analyzer (Windows)
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache LLVM and Cppcheck
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\LLVM
            C:\Program Files\Cppcheck
          key: win-llvm14-cppcheck-v1

      - name: Install dependencies
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: bash
        run: sh .github/workflows/install-deps-windows.sh

      - name: Add tools to PATH
        if: steps.cache-llvm.outputs.cache-hit == 'true'
        shell: bash
        run: |
          echo "C:\\Program Files\\LLVM\\bin" >> "$GITHUB_PATH"
          echo "C:\\Program Files\\Cppcheck" >> "$GITHUB_PATH"

      - name: Build the package
        shell: bash
        run: |
          make pip_dev_deps
          BUILD_UI_DIST=NO make package

      - name: Run analyzer unit tests
        shell: bash
        working-directory: analyzer
        run: |
          make test_unit \
            EXTRA_PYTEST_ARGS="--timeout=120 --timeout-method=thread"

  web-windows:
    name: Web (Windows)
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache LLVM and Cppcheck
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\LLVM
            C:\Program Files\Cppcheck
          key: win-llvm14-cppcheck-v1

      - name: Install dependencies
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: bash
        run: sh .github/workflows/install-deps-windows.sh

      - name: Add tools to PATH
        if: steps.cache-llvm.outputs.cache-hit == 'true'
        shell: bash
        run: |
          echo "C:\\Program Files\\LLVM\\bin" >> "$GITHUB_PATH"
          echo "C:\\Program Files\\Cppcheck" >> "$GITHUB_PATH"

      - name: Build the package
        shell: bash
        run: |
          make pip_dev_deps
          pip3 install -r web/requirements_py/auth/requirements.txt
          BUILD_UI_DIST=NO make package
          python3 -m compileall -q build/CodeChecker/lib/python3 web/tests || true

      - name: Run web unit tests
        shell: bash
        working-directory: web
        run: |
          # The server and client unit suites share the package name 'unit',
          # so they must be collected in separate pytest sessions.
          REPO_ROOT="$(cd .. && pwd)" \
            pytest -v -c pytest.ini --timeout=300 --timeout-method=thread \
              server server/tests/unit
          REPO_ROOT="$(cd .. && pwd)" \
            pytest -v -c pytest.ini --timeout=300 --timeout-method=thread \
              client client/tests/unit

      - name: Run web functional tests
        shell: bash
        working-directory: web
        env:
          CC_TEST_API_WORKERS: "1"
          CC_TEST_TASK_WORKERS: "1"
        run: |
          # Build logging (CodeChecker log / check -b) is unsupported on
          # Windows, so only functional suites that store results via
          # check_and_store() (which uses CodeChecker analyze) can run. The
          # two excluded tests need re-analysis/detection-status changes that
          # depend on build logging.
          REPO_ROOT="$(cd .. && pwd)" \
          BUILD_DIR="$(cd .. && pwd)/build" \
          TEST_CLANG_VERSION=stable \
          TEST_PROJ="$(pwd)/tests/projects" \
            pytest -v --tb=short --timeout=300 --timeout-method=thread \
              tests/functional/db_cleanup \
              tests/functional/run_tag \
              tests/functional/review_status \
              tests/functional/suppress \
              -k "not test_review_and_detection_status_changes and not test_suppress_import"

  gui:
    name: GUI
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        # FIXME: in Chrome the UI test cases run non-deterministically and
        # sometimes fail. For this reason we will not run GUI test cases
        # in Chrome.
        browser: [firefox]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v1
        with:
          node-version: '20.x'

      # - name: Update chrome
      #   run: |
      #     sudo apt-get update -q
      #     sudo apt-get install google-chrome-stable

      - name: Install dependencies
        run: sh .github/workflows/install-deps.sh

      - name: Build the package
        run: |
          make pip_dev_deps
          pip3 install -r web/requirements_py/auth/requirements.txt
          make package

      - name: Run tests
        working-directory: web/server/vue-cli
        env:
          # CHROME_HEADLESS: 1
          MOZ_HEADLESS: 1
          DISPLAY: ":99.0"
        run: |
          export PATH="${{ github.workspace }}/build/CodeChecker/bin:$PATH"

          npm run test:lint
          npm run test:unit
          # npm run test:e2e.${{ matrix.browser }}
